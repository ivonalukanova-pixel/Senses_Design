<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senses Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        /* Махаме всички излишни разстояния */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Правим страницата да заема целия екран */
        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* Основният контейнер */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Лого горе, Текст в средата, Меню долу */
            align-items: center;
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('int.jpg') no-repeat center center;
            background-size: cover;
            padding: 40px 0; /* Разстояние от ръбовете */
            text-align: center;
        }

        /* ЛОГОТО */
        .logo-wrap img {
            width: 150px;
            height: auto;
        }

        /* ТЕКСТЪТ И БУТОНЪТ */
        .main-content {
            /* Това "margin-bottom" избутва текста нагоре, за да е НАД МАСАТА */
            margin-bottom: 12vh; 
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 200;
            letter-spacing: 5px;
            line-height: 1.2;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.8);
            padding: 12px 45px;
            border-radius: 50px;
            font-size: 14px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .btn:hover { background: white; color: black; }

        /* МЕНЮТО НАЙ-ДОЛУ */
        .footer-nav {
            display: flex;
            gap: 40px;
        }

        .footer-nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .footer-nav a:hover { color: white; }

        /* За мобилни телефони */
        @media (max-width: 600px) {
            .footer-nav { flex-direction: column; gap: 10px; }
            .main-content { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-wrap">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="main-content">
            <h1>ИНТЕРИОР, КОЙТО<br>СЕ ЧУВСТВА</h1>
            <a href="#" class="btn">ОТКРИЙ ПОВЕЧЕ</a>
        </div>

        <nav class="footer-nav">
            <a href="#">ABOUT US</a>
            <a href="#">CONCEPTUAL WORKS</a>
            <a href="#">CONTACT US</a>
        </nav>
    </section>

</body>
</html>
